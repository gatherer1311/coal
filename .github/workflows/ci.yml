name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".prettierrc.json"
      - ".prettierignore"
      - ".github/workflows/ci.yml"
  # No path filter on pull_request: CI is a *required* check, and a required
  # check that never runs (because a PR didn't touch the filtered paths) leaves
  # the PR stuck forever. So CI runs on every PR to main.
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: typecheck, test, format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check
