name: Release (RPM)

# Builds the Linux RPM — the SPEC §3.1 launch target — and publishes it.
#
#   - Push a tag `vX.Y.Z`   -> build + create a GitHub *prerelease* with the .rpm attached.
#   - Manual "Run workflow"  -> build + upload the .rpm as a downloadable run artifact (no release).
#
# electron-builder owns packaging (SPEC §4); electron-vite produces `out/` first.
# DEB / Flatpak / macOS / Android and RPM signing are deliberately out of scope here (post-launch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for this manual build (e.g. 0.1.0-test). Blank = package.json version."
        required: false
        default: ""

# Least privilege: the workflow defaults to read-only. Only the `publish` job elevates to
# contents: write, so the untrusted build (npm ci / electron-builder run third-party code)
# never holds a write-scoped token.
permissions:
  contents: read

jobs:
  build:
    name: Build RPM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact: ${{ steps.version.outputs.artifact }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Full history so the tag-provenance gate below can run `git merge-base`.
          fetch-depth: 0

      - name: Reject tags not reachable from main
        # Defense-in-depth for the locked-main invariant: `main` is review-gated but tags are
        # not (there is no tag ruleset). Refuse to build/publish any `v*` tag whose commit did
        # not reach `main` through a reviewed squash-merge — BEFORE any untrusted code runs.
        if: github.event_name == 'push'
        run: |
          set -eu
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at a commit not on main; refusing to build."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} is on main — proceeding."

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install RPM build tooling
        # electron-builder shells out to `rpmbuild` to assemble the .rpm; it is not present
        # on the ubuntu-latest image by default.
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version and stamp package.json
        id: version
        # Untrusted inputs (tag name, dispatch input) are read via env vars and only ever
        # used as quoted shell variables — never interpolated into a command with ${{ }} —
        # and are allowlist-validated, so a crafted tag cannot inject a command.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "push" ]; then
            v="${REF_NAME#v}"                 # tag v0.1.0 -> 0.1.0
          elif [ -n "${INPUT_VERSION}" ]; then
            v="${INPUT_VERSION#v}"
          else
            v="$(node -p "require('./package.json').version")"
          fi
          case "$v" in
            ''|*[!0-9A-Za-z.+-]*)
              echo "::error::Refusing to build: invalid version '$v'"; exit 1 ;;
          esac
          # electron-builder names the artifact from package.json version; the repo keeps
          # 0.0.0, so stamp the resolved version for this build only (never committed).
          npm version "$v" --no-git-tag-version --allow-same-version
          printf 'version=%s\n' "$v" >> "$GITHUB_OUTPUT"
          printf 'artifact=coal-rpm-%s\n' "$v" >> "$GITHUB_OUTPUT"
          printf 'Building Coal %s\n' "$v"

      - name: Build (electron-vite)
        run: npm run build

      - name: Package RPM
        run: npx electron-builder --linux rpm --publish never

      - name: Show artifacts
        run: ls -alh dist/*.rpm

      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.version.outputs.artifact }}
          path: dist/*.rpm
          if-no-files-found: error

  publish:
    name: Publish prerelease
    # Only tag pushes publish a release; manual dispatch stops after `build` (artifact only).
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      # Scoped to publishing: create the prerelease and attach the .rpm. This job runs only
      # trusted actions (no npm ci / build), so the write token never covers third-party code.
      contents: write
    steps:
      - name: Download RPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist

      - name: Publish prerelease
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          prerelease: true
          files: dist/*.rpm
          fail_on_unmatched_files: true
          generate_release_notes: true
